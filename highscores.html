<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CYBER SHIELD - HIGH SCORES</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { darkMode: "class", theme: { extend: {
            colors: {
                "surface": "#0d112a", "surface-dim": "#0d112a",
                "surface-container": "#1a1e37", "surface-container-low": "#161a33",
                "surface-container-high": "#242842", "surface-container-highest": "#2f334e",
                "surface-container-lowest": "#080c25",
                "on-surface": "#dee0ff", "on-surface-variant": "#bbc9cf",
                "primary": "#a8e8ff", "primary-container": "#00d4ff",
                "on-primary": "#003642", "on-primary-container": "#00586b",
                "secondary-container": "#34ff8d",
                "error": "#ffb4ab", "error-container": "#93000a",
                "outline": "#859398", "outline-variant": "#3c494e",
                "background": "#0d112a", "on-background": "#dee0ff",
            },
            fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] },
        }}}
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(22, 26, 51, 0.8); backdrop-filter: blur(12px); }
        .gold-glow { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); border: 1px solid rgba(255, 215, 0, 0.4); }
        .cyan-glow { box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<script src="game-data.js"></script>

<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-[#0d112a]/80 backdrop-blur-md border-b border-[#00d4ff]/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-[#00d4ff] text-3xl">shield</span>
        <h1 class="font-headline font-bold tracking-tighter uppercase text-2xl text-[#00d4ff] italic">CYBER SHIELD</h1>
    </div>
    <a href="index.html" class="bg-[#00d4ff]/10 border border-[#00d4ff]/30 px-4 py-1 rounded-full no-underline">
        <span class="font-headline font-bold text-[#00d4ff] text-sm">← HOME</span>
    </a>
</header>

<main class="flex-grow pt-24 pb-32 px-4 max-w-5xl mx-auto w-full">
    <div class="mb-10 text-center md:text-left">
        <p class="text-primary uppercase tracking-[0.3em] text-xs font-bold mb-2">System Records</p>
        <h2 class="font-headline text-5xl md:text-6xl font-black tracking-tight text-on-surface italic uppercase">
            High <span class="text-[#00d4ff]">Scores</span>
        </h2>
    </div>

    <!-- Table Header -->
    <div class="grid grid-cols-5 px-6 py-2 text-[10px] font-bold text-outline tracking-widest uppercase mb-1">
        <div>Rank</div><div>Date</div><div class="text-center">Level</div><div class="text-right">Stars</div><div class="text-right">Score</div>
    </div>

    <!-- Scores Container -->
    <div id="scores-list" class="space-y-3">
        <!-- JS fills -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
        <span class="material-symbols-outlined text-outline/30 text-6xl mb-4">leaderboard</span>
        <p class="text-on-surface-variant text-lg">No scores yet. Play a game to set your first record!</p>
        <a href="gameplay.html?level=1" class="inline-block mt-6 px-8 py-3 bg-gradient-to-r from-primary to-primary-container rounded-lg font-headline font-bold text-on-primary-container no-underline hover:scale-105 transition-transform">PLAY NOW</a>
    </div>

    <!-- Summary Card -->
    <div id="summary-card" class="mt-12 glass-panel rounded-2xl p-8 border border-[#00d4ff]/20 cyan-glow">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex gap-12 text-center md:text-left">
                <div>
                    <p class="text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Lifetime Best</p>
                    <p id="best-score" class="font-headline text-4xl font-black text-[#00d4ff]">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Total Games</p>
                    <p id="total-games" class="font-headline text-4xl font-black text-secondary-container">0</p>
                </div>
            </div>
            <a href="index.html" class="w-full md:w-auto px-10 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold uppercase tracking-widest rounded-lg shadow-[0_0_20px_rgba(0,212,255,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 no-underline">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
                RETURN TO HUD
            </a>
        </div>
    </div>
</main>

<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0d112a]/90 backdrop-blur-lg border-t border-white/5 rounded-t-2xl">
    <a class="text-slate-500 p-3 hover:text-white" href="index.html"><span class="material-symbols-outlined">home</span></a>
    <a class="text-slate-500 p-3 hover:text-white" href="gameplay.html?level=1"><span class="material-symbols-outlined">videogame_asset</span></a>
    <a class="bg-[#00d4ff]/10 text-[#00d4ff] rounded-xl p-3" href="highscores.html"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">leaderboard</span></a>
    <a class="text-slate-500 p-3 hover:text-white" href="settings.html"><span class="material-symbols-outlined">settings</span></a>
</nav>

<!-- Background decoration -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[500px] h-[500px] bg-secondary-container/5 rounded-full blur-[120px] pointer-events-none"></div>

<script>
(() => {
    const scores = GameData.getHighScores();
    const list = document.getElementById('scores-list');
    const emptyState = document.getElementById('empty-state');
    const summaryCard = document.getElementById('summary-card');

    if (scores.length === 0) {
        emptyState.classList.remove('hidden');
        summaryCard.classList.add('hidden');
        return;
    }

    document.getElementById('best-score').textContent = scores[0].score.toLocaleString();
    document.getElementById('total-games').textContent = scores.length;

    scores.forEach((entry, i) => {
        const rank = i + 1;
        const isGold = rank === 1;
        const row = document.createElement('div');

        const baseCls = 'grid grid-cols-5 items-center px-6 rounded-xl';
        if (isGold) {
            row.className = `${baseCls} py-5 bg-gradient-to-r from-[rgba(255,215,0,0.15)] to-transparent gold-glow relative overflow-hidden`;
            row.innerHTML = `<div class="absolute inset-y-0 left-0 w-1 bg-gradient-to-b from-yellow-400 to-yellow-600"></div>`;
        } else {
            row.className = `${baseCls} py-4 bg-surface-container-low border border-white/5 hover:bg-surface-container-high transition-all`;
            if (rank > 5) row.style.opacity = '0.7';
        }

        const rankColor = isGold ? 'text-yellow-400' : 'text-outline';
        const scoreColor = isGold ? 'text-yellow-400' : 'text-on-surface';
        const starColor = isGold ? 'text-yellow-400' : 'text-primary-container';

        let starsHtml = '';
        const numStars = entry.stars || 1;
        for (let s = 0; s < 3; s++) {
            if (s < numStars) {
                starsHtml += `<span class="material-symbols-outlined ${starColor} text-sm" style="font-variation-settings:'FILL' 1;">star</span>`;
            } else {
                starsHtml += `<span class="material-symbols-outlined text-outline-variant text-sm">star</span>`;
            }
        }

        const medal = isGold ? `<span class="material-symbols-outlined text-yellow-400 text-xl" style="font-variation-settings:'FILL' 1;">workspace_premium</span>` : '';

        row.innerHTML += `
            <div class="col-span-1 flex items-center gap-3">
                <span class="font-headline text-xl font-bold ${rankColor} italic">${String(rank).padStart(2, '0')}</span>
                ${medal}
            </div>
            <div class="col-span-1 text-sm text-outline">${entry.date || '—'}</div>
            <div class="col-span-1 text-center">
                <span class="bg-surface-container-highest px-3 py-1 rounded text-[10px] font-bold">LEVEL ${String(entry.level || 1).padStart(2, '0')}</span>
            </div>
            <div class="col-span-1 flex justify-end gap-0.5">${starsHtml}</div>
            <div class="col-span-1 text-right font-headline text-xl font-bold ${scoreColor} tracking-tighter">${(entry.score || 0).toLocaleString()}</div>
        `;
        list.appendChild(row);
    });
})();
</script>
</body>
</html>
