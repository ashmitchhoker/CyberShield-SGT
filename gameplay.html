<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CYBER SHIELD - Toxic Rain</title>
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      as="style"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <script src="js/components.js"></script>
  </head>
  <body
    class="bg-surface-dim font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden h-[100dvh] w-screen"
  >
    <script src="game-data.js"></script>

    <!-- Background Layer -->
    <div class="fixed inset-0 z-0 overflow-hidden bg-[#03010b]">
      <!-- Deep blue to purple neon gradient -->
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#1d113c] via-[#090518] to-[#04010a]"></div>

      <!-- Soft vignette edges for depth -->
      <div class="absolute inset-0 pointer-events-none z-[5] bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.85)_100%)]"></div>

      <!-- Smooth atmospheric glowing orbs -->
      <div class="absolute top-[15%] left-[20%] w-[35rem] h-[35rem] bg-primary/10 rounded-full blur-[120px] mix-blend-screen opacity-60 bg-blur-mobile-opt"></div>
      <div class="absolute bottom-[10%] right-[15%] w-[40rem] h-[40rem] bg-error/10 rounded-full blur-[140px] mix-blend-screen opacity-50 bg-blur-mobile-opt"></div>
      <div class="absolute top-[45%] left-1/2 -translate-x-1/2 w-[30rem] h-[30rem] bg-secondary-container/5 rounded-full blur-[100px] mix-blend-screen bg-blur-mobile-opt"></div>

      <!-- Cyber Grid Background -->
      <div class="cyber-grid"></div>

      <!-- Background Stars -->
      <div class="absolute inset-0 pointer-events-none opacity-[0.85] z-0">
        <!-- Star particles -->
        <div class="star-particle" style="left: 10%; top: 15%; width: 3px; height: 3px; animation-duration: 2s; animation-delay: 0s;"></div>
        <div class="star-particle" style="left: 25%; top: 35%; width: 4px; height: 4px; animation-duration: 3s; animation-delay: 1s;"></div>
        <div class="star-particle" style="left: 45%; top: 10%; width: 2px; height: 2px; animation-duration: 2.5s; animation-delay: 0.5s;"></div>
        <div class="star-particle" style="left: 70%; top: 20%; width: 3px; height: 3px; animation-duration: 4s; animation-delay: 2s;"></div>
        <div class="star-particle" style="left: 85%; top: 40%; width: 5px; height: 5px; animation-duration: 3.5s; animation-delay: 1.5s;"></div>
        <div class="star-particle" style="left: 15%; top: 60%; width: 3px; height: 3px; animation-duration: 2.8s; animation-delay: 0.2s;"></div>
        <div class="star-particle" style="left: 35%; top: 75%; width: 4px; height: 4px; animation-duration: 3.2s; animation-delay: 0.8s;"></div>
        <div class="star-particle" style="left: 60%; top: 65%; width: 2px; height: 2px; animation-duration: 2.1s; animation-delay: 1.2s;"></div>
        <div class="star-particle" style="left: 80%; top: 85%; width: 3px; height: 3px; animation-duration: 3.9s; animation-delay: 0.4s;"></div>
        <div class="star-particle" style="left: 95%; top: 55%; width: 4px; height: 4px; animation-duration: 2.4s; animation-delay: 0.7s;"></div>
        <div class="star-particle" style="left: 5%; top: 80%; width: 2px; height: 2px; animation-duration: 3.1s; animation-delay: 1.1s;"></div>
        <div class="star-particle" style="left: 55%; top: 90%; width: 3px; height: 3px; animation-duration: 2.6s; animation-delay: 1.9s;"></div>
        <div class="star-particle" style="left: 40%; top: 45%; width: 5px; height: 5px; animation-duration: 4.2s; animation-delay: 0.3s;"></div>
        <div class="star-particle" style="left: 90%; top: 15%; width: 2px; height: 2px; animation-duration: 2.9s; animation-delay: 1.4s;"></div>
        <div class="star-particle" style="left: 20%; top: 95%; width: 3px; height: 3px; animation-duration: 3.7s; animation-delay: 0.9s;"></div>
        
        <!-- Subtle Purple/Blue glowing large orbs in the background -->
        <div class="absolute top-[20%] left-[10%] w-2 h-2 rounded-full bg-[#00d4ff] shadow-[0_0_15px_3px_#00d4ff] opacity-40"></div>
        <div class="absolute bottom-[30%] right-[20%] w-3 h-3 rounded-full bg-[#b300ff] shadow-[0_0_20px_4px_#b300ff] opacity-30"></div>
        <div class="absolute top-[60%] left-[80%] w-2 h-2 rounded-full bg-[#ff0055] shadow-[0_0_15px_3px_#ff0055] opacity-20"></div>
      </div>
    </div>

    <!-- HUD (Top) -->
    <header
      id="hud"
      class="fixed top-0 w-full z-50 px-4 pt-4 pb-6 bg-gradient-to-b from-[#03010b] to-transparent"
      style="display: none"
    >
      <div class="max-w-3xl lg:max-w-4xl mx-auto flex justify-between items-start gap-1 sm:gap-4 px-1 sm:px-4 mt-2">
        <!-- Shield Hearts -->
        <div class="flex flex-col gap-1 flex-1 min-w-[30%]">
          <div class="text-[9px] sm:text-[12px] font-headline font-bold text-[#8fa2be] tracking-wider uppercase">
            SHIELD STATUS:
          </div>
          <div id="shield-status-pill" class="border border-[#00ff66] bg-[#002211] text-[#00ff66] px-1 sm:px-2.5 py-0.5 sm:py-1 rounded-md flex items-center gap-0.5 sm:gap-1 text-[9px] sm:text-sm font-headline font-bold uppercase w-fit shadow-[0_0_10px_rgba(0,255,102,0.2)]">
            <span id="shield-status-icon" class="material-symbols-outlined text-[12px] sm:text-[16px]">check</span>
            <span id="shield-status">OPTIMIZED</span>
          </div>
          <div id="lives-display" class="flex items-center gap-0.5 sm:gap-1 mt-0.5 scale-90 sm:scale-100 origin-left">
            <!-- JS fills shield icons -->
          </div>
        </div>

        <!-- Level Info - Center Title -->
        <div class="flex flex-col items-center justify-start text-center shrink-0 mx-2">
          <div class="flex flex-col items-center leading-none mt-[-4px]">
            <h2 class="font-headline font-black text-[14px] sm:text-[22px] tracking-[0.4em] text-[#00d4ff] mb-[-2px] sm:mb-[-2px]" style="text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);">
              CYBER
            </h2>
            <h1 class="font-headline font-black text-[28px] sm:text-[54px] tracking-widest text-[#00d4ff]"
                style="color: #020b14; -webkit-text-stroke: 1.5px #00d4ff; text-shadow: 0 0 20px rgba(0, 212, 255, 0.8), 0 0 5px rgba(0, 212, 255, 0.4);">
              SHIELD
            </h1>
          </div>
          <div class="mt-2 sm:mt-3 flex flex-col items-center gap-0.5 sm:gap-1">
            <div class="flex items-center gap-1 sm:gap-2 text-[#00ff66] text-[9px] sm:text-xs font-headline font-bold uppercase tracking-[0.1em]">
               <span class="opacity-70 tracking-tighter">---</span>
              <span id="level-label" class="tracking-widest">SECTOR 01</span>
              <span class="opacity-70 tracking-tighter">---</span>
            </div>
            <div class="flex items-center gap-1 sm:gap-1.5 text-[#00ff66] text-[9px] sm:text-xs font-headline font-bold uppercase tracking-widest">
              <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-[#00ff66] animate-pulse shadow-[0_0_5px_#00ff66]"></span>
              // ACTIVE
            </div>
            <!-- Progress counter now moved or simplified -->
            <div id="progress-counter" class="text-white/50 text-[9px] sm:text-[10px] font-headline uppercase tracking-widest mt-1"></div>
          </div>
        </div>

        <!-- Timer & Pause -->
        <div class="flex items-start justify-end gap-1.5 sm:gap-3 flex-1 min-w-[30%]">
          <div
            class="px-2 py-1 sm:px-4 sm:py-2 rounded-full border border-[#00d4ff] flex items-center gap-1 sm:gap-2 shadow-[0_0_15px_rgba(0,212,255,0.2)] whitespace-nowrap"
            style="background: linear-gradient(180deg, rgba(0,40,80,0.6) 0%, rgba(2,11,20,0.9) 100%);"
          >
            <span
              class="material-symbols-outlined text-[#00d4ff] text-[16px] sm:text-[24px]"
              >schedule</span
            >
            <span
              id="timer-display"
              class="font-headline font-bold text-[#e0f7fa] text-xs sm:text-xl tabular-nums tracking-widest pt-px"
              >0:45</span
            >
          </div>
          <button
            id="pause-btn"
            class="w-7 h-7 sm:w-11 sm:h-11 rounded-md border border-[#00d4ff] flex items-center justify-center active:scale-90 transition-transform shadow-[0_0_15px_rgba(0,212,255,0.2)] shrink-0"
            style="background: linear-gradient(180deg, rgba(0,40,80,0.6) 0%, rgba(2,11,20,0.9) 100%);"
          >
            <span class="material-symbols-outlined text-[#00d4ff] text-[16px] sm:text-[26px]"
              >pause</span
            >
          </button>
        </div>
      </div>
    </header>

    <!-- Intro Tutorial Overlay -->
    <div
      id="intro-overlay"
      class="fixed inset-0 z-[70] flex flex-col items-center justify-center px-6"
      style="background: rgba(10, 14, 39, 0.95); backdrop-filter: blur(8px)"
    >
      <div class="max-w-md w-full text-center">
        <!-- How to play image -->
        <img
          src="how_to_play.png"
          alt="How to Play"
          class="w-full h-auto mb-8 rounded-xl shadow-[0_0_20px_rgba(0,212,255,0.3)]"
        />

        <button
          id="start-game-btn"
          class="w-full py-4 px-8 bg-gradient-to-r from-primary to-primary-container rounded-xl font-headline font-bold text-on-primary-container text-xl shadow-[0_0_25px_rgba(0,212,255,0.4)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3"
        >
          <span class="material-symbols-outlined text-2xl">play_arrow</span>
          START GAME
        </button>
      </div>
    </div>

    <!-- Main Gameplay Area -->
    <main class="relative z-10 w-full h-full flex flex-col pt-24 pb-4">
      <!-- Word Playground (where capsules fall) -->
      <div id="playground" class="flex-1 w-full relative">
        <!-- JS spawns word capsules here -->
      </div>

      <!-- Shield Barrier -->
      <div
        id="shield-barrier"
        class="w-full relative flex flex-col items-center justify-end px-4 pb-2"
      >
        <!-- Cyberbullying Awareness Bar -->
        <div
          id="cyber-alert-bar"
          class="w-full max-w-xl mx-auto pointer-events-none z-30 transition-all duration-500"
          style="filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.3))"
        >
          <div
            class="px-4 py-2 rounded-2xl flex items-center justify-center"
            style="
              background: linear-gradient(
                135deg,
                rgba(0, 212, 255, 0.1) 0%,
                rgba(120, 0, 255, 0.06) 50%,
                rgba(0, 212, 255, 0.1) 100%
              );
              border: 1.5px solid rgba(0, 212, 255, 0.4);
              box-shadow:
                0 0 20px rgba(0, 212, 255, 0.15),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
            "
          >
            <span
              id="cyber-alert-text"
              class="text-sm md:text-base font-headline font-black uppercase tracking-[0.2em]"
              style="
                color: #00d4ff;
                text-shadow:
                  0 0 10px rgba(0, 212, 255, 0.6),
                  0 0 30px rgba(0, 212, 255, 0.2);
              "
              >⚡ SAY NO TO CYBERBULLYING ⚡</span
            >
          </div>
        </div>
      </div>
    </main>

    <!-- Removed Bottom Nav during active gameplay to maximize space -->

      <!-- Vignette -->
    <div
      class="fixed inset-0 pointer-events-none z-[60] bg-[radial-gradient(circle_at_center,transparent_40%,rgba(0,0,0,0.5)_100%)]"
    ></div>

    <!-- Starfield Generator Script -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const bgContainer = document.createElement("div");
        bgContainer.className =
          "fixed inset-0 z-[1] overflow-hidden pointer-events-none";

        // Find the background layer to insert stars properly
        const bgLayer = document.querySelector(".fixed.inset-0.z-0");
        if (bgLayer) {
          bgLayer.after(bgContainer);
        } else {
          document.body.appendChild(bgContainer);
        }

        // Fewer stars on mobile for performance
        const isMobile = window.innerWidth <= 768;
        const starCount = isMobile ? 15 : 60;

        for (let i = 0; i < starCount; i++) {
          const star = document.createElement("div");
          star.className = "star-particle";

          // Generate varying star speeds and sizes
          const size = Math.random() * 3 + 1 + "px"; // 1px to 4px
          const left = Math.random() * 100 + "vw";
          const top = Math.random() * 100 + "vh";
          const duration = Math.random() * 3 + 2 + "s";
          const delay = Math.random() * -5 + "s";

          star.style.width = size;
          star.style.height = size;
          star.style.left = left;
          star.style.top = top;
          
          star.style.animationDuration = duration;
          star.style.animationDelay = delay;

          bgContainer.appendChild(star);
        }
      });
    </script>

    <!-- Mobile: reduce heavy blur on background orbs -->
    <style>
      @media (max-width: 768px) {
        .bg-blur-mobile-opt { filter: blur(40px) !important; }
      }
    </style>

    <!-- ==================== GAME ENGINE ==================== -->
    <script src="js/game-engine.js"></script>
  </body>
</html>
