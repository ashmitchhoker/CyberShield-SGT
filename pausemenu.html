<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cyber Shield - Paused</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0d112a", "surface-dim": "#0d112a", "surface-bright": "#343752",
                        "surface-container": "#1a1e37", "surface-container-low": "#161a33",
                        "surface-container-high": "#242842", "surface-container-highest": "#2f334e",
                        "surface-container-lowest": "#080c25",
                        "on-surface": "#dee0ff", "on-surface-variant": "#bbc9cf",
                        "primary": "#a8e8ff", "primary-container": "#00d4ff",
                        "on-primary": "#003642", "on-primary-container": "#00586b",
                        "secondary": "#f5fff3", "secondary-container": "#34ff8d",
                        "tertiary": "#ffd5d8", "tertiary-container": "#ffadb6",
                        "error": "#ffb4ab", "error-container": "#93000a",
                        "on-error": "#690005", "on-error-container": "#ffdad6",
                        "outline": "#859398", "outline-variant": "#3c494e",
                        "background": "#0d112a", "on-background": "#dee0ff",
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(22, 26, 51, 0.8); backdrop-filter: blur(12px); }
        .ion-gradient-primary { background: linear-gradient(135deg, #a8e8ff 0%, #00d4ff 100%); }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
    <script src="game-data.js"></script>

    <!-- Frozen Background -->
    <div class="fixed inset-0 z-0 bg-gradient-to-b from-[#0a0e27] via-[#0d112a] to-[#120a2e]">
        <div class="absolute inset-0 bg-surface/60 backdrop-blur-sm"></div>
    </div>

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-[#0d112a]/80 backdrop-blur-md border-b border-[#00d4ff]/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#00d4ff] drop-shadow-[0_0_8px_rgba(0,212,255,0.4)]">shield</span>
            <h1 class="font-headline font-bold tracking-tighter uppercase text-2xl text-[#00d4ff]">CYBER SHIELD</h1>
        </div>
        <div class="text-[#00d4ff] font-headline font-bold tracking-tighter uppercase text-lg px-4 py-1 bg-[#00d4ff]/10 rounded-lg">
            SCORE: <span id="header-score">0</span>
        </div>
    </header>

    <!-- Main Pause Overlay -->
    <main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4">
        <div class="glass-card w-full max-w-md rounded-xl p-8 border border-outline-variant/20 shadow-[0_20px_50px_rgba(0,0,0,0.6)]">
            <!-- Header -->
            <div class="text-center mb-10">
                <span class="font-headline text-xs uppercase tracking-[0.4em] text-primary/60 mb-2 block">SYSTEM INTERRUPTED</span>
                <h2 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">PAUSED</h2>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-4 mb-10">
                <div class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10">
                    <span class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1">SCORE</span>
                    <span id="stat-score" class="text-2xl font-headline font-bold text-primary-container">0</span>
                </div>
                <div class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10">
                    <span class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1">TIME</span>
                    <span id="stat-time" class="text-2xl font-headline font-bold text-on-surface">0:00</span>
                </div>
                <div class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10">
                    <span class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1">HEALTH</span>
                    <div id="stat-lives" class="flex gap-1 mt-1">
                        <!-- JS fills -->
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <nav class="flex flex-col gap-4">
                <button id="resume-btn" class="ion-gradient-primary text-on-primary font-headline font-bold tracking-widest uppercase py-4 rounded-lg flex items-center justify-center gap-3 active:scale-95 transition-all neon-glow-cyan">
                    <span class="material-symbols-outlined">play_circle</span>
                    RESUME
                </button>
                <button id="restart-btn" class="bg-surface-container-high hover:bg-white/5 text-on-surface font-headline font-bold tracking-widest uppercase py-4 rounded-lg flex items-center justify-center gap-3 border border-outline-variant/20 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-tertiary-container">replay</span>
                    RESTART
                </button>
                <button id="quit-btn" class="mt-4 text-error font-headline font-bold tracking-widest uppercase text-sm hover:underline active:opacity-60 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">power_settings_new</span>
                    QUIT SYSTEM
                </button>
            </nav>

            <!-- Separator -->
            <div class="w-1/2 h-[1px] bg-outline-variant/20 mx-auto my-8"></div>

            <!-- Sound Toggle -->
            <div class="flex justify-center">
                <button id="sound-toggle" class="p-3 bg-surface-container-low rounded-full border border-outline-variant/10 text-on-surface-variant hover:text-primary transition-colors">
                    <span class="material-symbols-outlined" id="sound-icon">volume_up</span>
                </button>
            </div>
        </div>

        <p class="mt-12 font-headline text-[10px] tracking-[0.3em] text-outline-variant/40 uppercase">
            v2.4.5 // Neural Interface: SECURE
        </p>
    </main>

    <script>
    (() => {
        const state = GameData.getGameState();
        const level = state ? state.level : 1;

        if (state) {
            document.getElementById('header-score').textContent = (state.score || 0).toLocaleString();
            document.getElementById('stat-score').textContent = (state.score || 0).toLocaleString();

            const tl = state.timeLeft || 0;
            document.getElementById('stat-time').textContent = `${Math.floor(tl/60)}:${(tl%60).toString().padStart(2,'0')}`;

            // Lives icons
            const livesContainer = document.getElementById('stat-lives');
            const maxLives = 5;
            const currentLives = state.lives || 0;
            for (let i = 0; i < maxLives; i++) {
                const s = document.createElement('span');
                s.className = 'material-symbols-outlined text-sm';
                if (i < currentLives) {
                    s.className += ' text-secondary-container';
                    s.style.fontVariationSettings = "'FILL' 1";
                } else {
                    s.className += ' text-outline-variant';
                }
                s.textContent = 'shield_with_heart';
                livesContainer.appendChild(s);
            }
        }

        // Resume — go back to gameplay with resume flag
        document.getElementById('resume-btn').addEventListener('click', () => {
            window.location.href = `gameplay.html?level=${level}&resume=1`;
        });

        // Restart — clear state and restart level
        document.getElementById('restart-btn').addEventListener('click', () => {
            GameData.clearGameState();
            window.location.href = `gameplay.html?level=${level}`;
        });

        // Quit — go to main menu
        document.getElementById('quit-btn').addEventListener('click', () => {
            GameData.clearGameState();
            window.location.href = 'index.html';
        });

        // Sound toggle
        const settings = GameData.getSettings();
        const soundIcon = document.getElementById('sound-icon');
        let soundOn = settings.soundEffects;
        soundIcon.textContent = soundOn ? 'volume_up' : 'volume_off';

        document.getElementById('sound-toggle').addEventListener('click', () => {
            soundOn = !soundOn;
            soundIcon.textContent = soundOn ? 'volume_up' : 'volume_off';
            const s = GameData.getSettings();
            s.soundEffects = soundOn;
            GameData.saveSettings(s);
        });
    })();
    </script>
</body>
</html>
