<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cyber Shield - Paused</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <script src="js/components.js"></script>
  </head>
  <body
    class="bg-[#03010b] text-on-surface font-body min-h-[100dvh] overflow-x-hidden flex flex-col items-center"
  >
    <script src="game-data.js"></script>

    <!-- Frozen Background -->
    <div class="fixed inset-0 z-0 pointer-events-none">
      <div class="cyber-grid w-full h-full opacity-60"></div>
      <div id="starfield" class="absolute inset-0"></div>
    </div>
    <div
      class="fixed inset-0 z-0 bg-surface/60 backdrop-blur-md pointer-events-none"
    ></div>

    <!-- Main Pause Overlay -->
    <main
      class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4"
    >
      <div
        class="glass-card w-full max-w-md rounded-xl p-8 border border-outline-variant/20 shadow-[0_20px_50px_rgba(0,0,0,0.6)]"
      >
        <!-- Header -->
        <div class="text-center mb-10">
          <span
            class="font-headline text-xs uppercase tracking-[0.4em] text-primary/60 mb-2 block"
            >SYSTEM INTERRUPTED</span
          >
          <h2
            class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]"
          >
            PAUSED
          </h2>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-10">
          <div
            class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10"
          >
            <span
              class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1"
              >SCORE</span
            >
            <span
              id="stat-score"
              class="text-2xl font-headline font-bold text-primary-container"
              >0</span
            >
          </div>
          <div
            class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10"
          >
            <span
              class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1"
              >TIME</span
            >
            <span
              id="stat-time"
              class="text-2xl font-headline font-bold text-on-surface"
              >0:00</span
            >
          </div>
          <div
            class="bg-surface-container-lowest/50 p-4 rounded-lg flex flex-col items-center justify-center border border-outline-variant/10"
          >
            <span
              class="text-[10px] font-headline tracking-widest text-outline uppercase mb-1"
              >HEALTH</span
            >
            <div id="stat-lives" class="flex gap-1 mt-1">
              <!-- JS fills -->
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <nav class="flex flex-col gap-4">
          <button
            id="resume-btn"
            class="bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-bold tracking-widest uppercase text-lg py-4 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-[0_0_25px_rgba(0,212,255,0.4)] hover:scale-[1.02]"
          >
            <span class="material-symbols-outlined text-2xl">play_circle</span>
            RESUME
          </button>
          <button
            id="restart-btn"
            class="bg-surface-container-high hover:bg-white/5 text-on-surface font-headline font-bold tracking-widest uppercase py-4 rounded-lg flex items-center justify-center gap-3 border border-outline-variant/20 active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-tertiary-container"
              >replay</span
            >
            RESTART
          </button>
          <button
            id="quit-btn"
            class="mt-4 text-error font-headline font-bold tracking-widest uppercase text-sm hover:underline active:opacity-60 transition-all flex items-center justify-center gap-2"
          >
            <span class="material-symbols-outlined text-sm"
              >power_settings_new</span
            >
            QUIT SYSTEM
          </button>
        </nav>

        <!-- Separator -->
        <div class="w-1/2 h-[1px] bg-outline-variant/20 mx-auto my-8"></div>

        <!-- Sound Controls -->
        <div class="flex flex-col items-center gap-4">
          <!-- Sound Effects Toggle -->
          <button
            id="sound-toggle"
            class="p-3 bg-surface-container-low rounded-full border border-outline-variant/10 text-on-surface-variant hover:text-primary transition-colors flex justify-center items-center"
          >
            <span class="material-symbols-outlined" id="sound-icon"
              >volume_up</span
            >
          </button>

          <!-- Music Volume Slider -->
          <div
            class="w-full max-w-[200px] flex items-center justify-between gap-3 bg-surface-container-lowest/50 p-3 rounded-lg border border-outline-variant/10"
          >
            <span class="material-symbols-outlined text-sm text-outline-variant"
              >music_note</span
            >
            <input
              type="range"
              id="music-slider"
              min="0"
              max="100"
              class="w-full accent-primary h-1 bg-outline-variant/30 rounded-lg appearance-none cursor-pointer"
            />
            <span
              id="music-vol-label"
              class="text-xs font-headline font-bold text-primary w-8 text-right"
              >50%</span
            >
          </div>
        </div>
      </div>

      <div class="mt-8 flex flex-col items-center gap-2">
        <a
          href="https://cybercrime.gov.in"
          target="_blank"
          class="text-sm font-headline font-bold text-primary hover:text-white transition-all flex items-center gap-2 no-underline tracking-wider uppercase py-3 px-6 rounded-xl border border-primary/30 hover:border-primary/60 bg-primary/10 hover:bg-primary/20 shadow-[0_0_15px_rgba(0,212,255,0.2)]"
        >
          <span class="material-symbols-outlined text-lg">security</span>
          Report Cybercrime Portal
        </a>
        <p
          class="font-headline text-[10px] tracking-[0.3em] text-outline-variant/40 uppercase"
        >
          v2.4.5 // Neural Interface: SECURE
        </p>
      </div>
    </main>

    <script>
      (() => {
        const state = GameData.getGameState();
        const level = state ? state.level : 1;

        if (state) {
          document.getElementById("stat-score").textContent = (
            state.score || 0
          ).toLocaleString();

          const tl = state.timeLeft || 0;
          document.getElementById("stat-time").textContent =
            `${Math.floor(tl / 60)}:${(tl % 60).toString().padStart(2, "0")}`;

          // Lives icons
          const livesContainer = document.getElementById("stat-lives");
          const maxLives = 5;
          const currentLives = state.lives || 0;
          for (let i = 0; i < maxLives; i++) {
            const s = document.createElement("span");
            s.className = "material-symbols-outlined text-sm";
            if (i < currentLives) {
              s.className += " text-secondary-container";
              s.style.fontVariationSettings = "'FILL' 1";
            } else {
              s.className += " text-outline-variant";
            }
            s.textContent = "shield_with_heart";
            livesContainer.appendChild(s);
          }
        }

        // Resume — go back to gameplay with resume flag
        document.getElementById("resume-btn").addEventListener("click", () => {
          window.location.href = `gameplay.html?level=${level}&resume=1`;
        });

        // Restart — clear state and restart level
        document.getElementById("restart-btn").addEventListener("click", () => {
          GameData.clearGameState();
          window.location.href = `gameplay.html?level=${level}`;
        });

        // Quit — go to main menu
        document.getElementById("quit-btn").addEventListener("click", () => {
          GameData.clearGameState();
          window.location.href = "index.html";
        });

        // Initialize Audio
        const settings = GameData.getSettings();
        let bgMusic = null;
        if (settings.music) {
          bgMusic = new Audio("music.mp3");
          bgMusic.loop = true;
          bgMusic.volume =
            settings.musicVolume !== undefined ? settings.musicVolume : 0.2;
          const savedTime = sessionStorage.getItem("cyberShield_musicTime");
          if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
          }
          bgMusic.play().catch((e) => console.log("Audio autoplay blocked", e));
        }

        // Save audio before leaving
        window.addEventListener("beforeunload", () => {
          if (bgMusic) {
            sessionStorage.setItem(
              "cyberShield_musicTime",
              bgMusic.currentTime,
            );
          }
        });

        // Sound toggle
        const soundIcon = document.getElementById("sound-icon");
        let soundOn = settings.soundEffects || settings.music;
        soundIcon.textContent = soundOn ? "volume_up" : "volume_off";

        document
          .getElementById("sound-toggle")
          .addEventListener("click", () => {
            soundOn = !soundOn;
            soundIcon.textContent = soundOn ? "volume_up" : "volume_off";
            const s = GameData.getSettings();
            s.soundEffects = soundOn;
            s.music = soundOn;
            if (bgMusic) {
              if (soundOn) {
                bgMusic.play().catch((e) => console.log(e));
              } else {
                bgMusic.pause();
              }
            }
            GameData.saveSettings(s);
          });

        // Music Volume Slider
        const musicSlider = document.getElementById("music-slider");
        const musicVolLabel = document.getElementById("music-vol-label");

        let currentVol =
          settings.musicVolume !== undefined ? settings.musicVolume : 0.2;
        musicSlider.value = currentVol * 100;
        musicVolLabel.textContent = `${Math.round(currentVol * 100)}%`;

        musicSlider.addEventListener("input", (e) => {
          currentVol = e.target.value / 100;
          musicVolLabel.textContent = `${Math.round(currentVol * 100)}%`;
          if (bgMusic) {
            bgMusic.volume = currentVol;
            if (currentVol > 0 && bgMusic.paused) {
              bgMusic.play().catch((err) => console.log(err));
            }
          }
          const s = GameData.getSettings();
          s.musicVolume = currentVol;
          GameData.saveSettings(s);
        });
      })();
    </script>
  </body>
</html>
