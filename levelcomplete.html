<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cyber Shield - Level Complete</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0d112a", "surface-dim": "#0d112a", "surface-bright": "#343752",
                        "surface-container": "#1a1e37", "surface-container-low": "#161a33",
                        "surface-container-high": "#242842", "surface-container-highest": "#2f334e",
                        "surface-container-lowest": "#080c25",
                        "on-surface": "#dee0ff", "on-surface-variant": "#bbc9cf",
                        "primary": "#a8e8ff", "primary-container": "#00d4ff",
                        "on-primary": "#003642", "on-primary-container": "#00586b",
                        "secondary": "#f5fff3", "secondary-container": "#34ff8d",
                        "tertiary": "#ffd5d8", "tertiary-container": "#ffadb6",
                        "error": "#ffb4ab", "error-container": "#93000a",
                        "on-error": "#690005", "on-error-container": "#ffdad6",
                        "outline": "#859398", "outline-variant": "#3c494e",
                        "background": "#0d112a", "on-background": "#dee0ff",
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"], "label": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glow-primary { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
        .glow-gold { filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.6)); }
        .particles-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
        }
        body { min-height: 100dvh; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden flex flex-col">
    <script src="game-data.js"></script>

    <!-- TopAppBar -->
    <header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-[#0d112a]/80 backdrop-blur-md border-b border-[#00d4ff]/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#00d4ff] drop-shadow-[0_0_8px_rgba(0,212,255,0.4)]">shield</span>
            <h1 class="font-headline font-black italic tracking-tighter uppercase text-2xl text-[#00d4ff] drop-shadow-[0_0_8px_rgba(0,212,255,0.4)]">CYBER SHIELD</h1>
        </div>
        <div class="flex items-center">
            <span class="font-headline font-bold tracking-tighter uppercase text-xl text-[#00d4ff]">SCORE: <span id="header-score">0</span></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 relative">
        <!-- Background -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary-container/10 rounded-full blur-[120px]"></div>
            <div class="absolute inset-0 particles-bg opacity-30"></div>
            <div class="absolute top-20 right-[10%] w-2 h-2 bg-[#ffdb58] rounded-full glow-gold"></div>
            <div class="absolute top-40 left-[15%] w-3 h-3 bg-primary-container rounded-full shadow-[0_0_10px_#00d4ff]"></div>
            <div class="absolute bottom-40 right-[20%] w-2 h-2 bg-secondary-container rounded-full shadow-[0_0_10px_#34ff8d]"></div>
        </div>

        <!-- Level Complete Card -->
        <div class="relative z-10 w-full max-w-2xl bg-surface-container/80 backdrop-blur-xl border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] p-8 md:p-12 text-center overflow-hidden">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-primary-container/20 rounded-full blur-3xl"></div>

            <!-- Stars -->
            <div class="mb-10 space-y-6">
                <div id="stars-display" class="flex justify-center gap-4 mb-8">
                    <!-- JS fills stars -->
                </div>
                <div class="space-y-2">
                    <p class="font-headline font-bold text-primary tracking-[0.3em] uppercase text-sm">MISSION ACCOMPLISHED</p>
                    <h2 class="font-headline font-black italic text-5xl md:text-7xl tracking-tighter text-on-surface drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">LEVEL COMPLETE!</h2>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
                <div class="bg-surface-container-high/50 p-6 rounded-lg border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-slate-400 font-headline font-bold text-xs uppercase tracking-widest mb-1">SCORE</span>
                    <span id="stat-score" class="text-primary-container font-headline font-black text-4xl">0</span>
                </div>
                <div class="bg-surface-container-high/50 p-6 rounded-lg border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-slate-400 font-headline font-bold text-xs uppercase tracking-widest mb-1">WORDS ZAPPED</span>
                    <span id="stat-zapped" class="text-secondary-container font-headline font-black text-4xl">0</span>
                </div>
                <div class="bg-surface-container-high/50 p-6 rounded-lg border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-slate-400 font-headline font-bold text-xs uppercase tracking-widest mb-1">ACCURACY</span>
                    <span id="stat-accuracy" class="text-tertiary-container font-headline font-black text-4xl">0%</span>
                </div>
            </div>

            <!-- Cyber Tip -->
            <div class="bg-surface-container-lowest border-l-4 border-primary-container p-6 mb-12 text-left relative overflow-hidden">
                <div class="flex items-start gap-4">
                    <span class="material-symbols-outlined text-primary-container mt-0.5">info</span>
                    <div>
                        <span class="font-headline font-bold text-xs text-primary-container uppercase tracking-widest block mb-2">CYBER TIP</span>
                        <p class="text-on-surface-variant text-sm leading-relaxed">
                            If someone sends you hateful messages online, don't reply. <span class="text-on-surface font-semibold">Block and report them</span> to keep your digital space secure.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="next-level-btn" class="px-10 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold tracking-widest uppercase rounded-lg shadow-[0_0_20px_rgba(0,212,255,0.4)] hover:scale-105 active:scale-95 transition-all">
                    NEXT LEVEL
                </button>
                <button id="replay-btn" class="px-10 py-4 bg-transparent border border-outline-variant hover:border-primary-container hover:bg-primary-container/10 text-on-surface font-headline font-bold tracking-widest uppercase rounded-lg active:scale-95 transition-all">
                    REPLAY
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0d112a]/90 backdrop-blur-lg border-t border-white/5 shadow-[0_-4px_20px_rgba(0,0,0,0.4)] rounded-t-2xl">
        <a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-white transition-all" href="index.html">
            <span class="material-symbols-outlined">home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-white transition-all" href="gameplay.html?level=1">
            <span class="material-symbols-outlined">videogame_asset</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-white transition-all" href="highscores.html">
            <span class="material-symbols-outlined">leaderboard</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-white transition-all" href="settings.html">
            <span class="material-symbols-outlined">settings</span>
        </a>
    </nav>

    <script>
    (() => {
        const state = GameData.getGameState();
        const level = state ? state.level : 1;
        const stars = state ? (state.stars || 1) : 1;

        if (state) {
            document.getElementById('header-score').textContent = (state.score || 0).toLocaleString();
            document.getElementById('stat-score').textContent = (state.score || 0).toLocaleString();
            document.getElementById('stat-zapped').textContent = `${state.wordsZapped || 0}/${state.totalToxicSpawned || 0}`;
            document.getElementById('stat-accuracy').textContent = (state.accuracy || 0) + '%';
        }

        // Render stars
        const starsContainer = document.getElementById('stars-display');
        for (let i = 0; i < 3; i++) {
            const span = document.createElement('span');
            span.className = 'material-symbols-outlined glow-gold transition-transform hover:scale-110';
            if (i === 1) {
                span.className += ' text-7xl md:text-8xl -mt-4';
            } else {
                span.className += ' text-6xl md:text-7xl';
            }
            if (i < stars) {
                span.style.color = '#ffdb58';
                span.style.fontVariationSettings = "'FILL' 1";
            } else {
                span.style.color = '#3c494e';
            }
            span.textContent = 'star';
            starsContainer.appendChild(span);
        }

        document.getElementById('next-level-btn').addEventListener('click', () => {
            GameData.clearGameState();
            window.location.href = `gameplay.html?level=${level + 1}`;
        });

        document.getElementById('replay-btn').addEventListener('click', () => {
            GameData.clearGameState();
            window.location.href = `gameplay.html?level=${level}`;
        });
    })();
    </script>
</body>
</html>
