<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CYBER SHIELD — Toxic Rain</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css" />
    <script src="js/components.js"></script>
  </head>
  <body class="bg-[#03010b] font-body text-on-surface overflow-x-hidden h-[100dvh] w-screen flex flex-col items-center justify-center relative"
  >
    
    <!-- Unified Deep Space Background -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="cyber-grid w-full h-full opacity-60"></div>
        <div id="starfield" class="absolute inset-0"></div>
    </div>


    <!-- Main Content -->
    <div
      class="relative z-10 flex flex-col items-center text-center px-6 max-w-lg w-full"
    >
      <!-- Shield Icon -->
      <div class="relative mb-6 animate-float">
        <div
          class="absolute -inset-8 bg-primary-container/20 blur-[50px] rounded-full"
        ></div>
        <span
          class="material-symbols-outlined text-primary-container text-[100px] drop-shadow-[0_0_30px_rgba(0,212,255,0.6)] relative"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >shield</span
        >
      </div>

      
      <!-- Title -->
      <div class="flex flex-col items-center leading-none mt-[-4px] mb-8">
        <h2 class="font-headline font-black text-[18px] sm:text-[26px] tracking-[0.4em] text-[#00d4ff] mb-[-2px]" style="text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);">
          CYBER
        </h2>
        <h1 class="font-headline font-black text-[50px] sm:text-[72px] tracking-widest text-[#00d4ff]"
            style="color: #020b14; -webkit-text-stroke: 1.5px #00d4ff; text-shadow: 0 0 20px rgba(0, 212, 255, 0.8), 0 0 5px rgba(0, 212, 255, 0.4);">
          SHIELD
        </h1>
      </div>

      <p class="text-on-surface-variant text-sm max-w-xs mb-12 leading-relaxed">
        Zap the toxic words. Protect the kind ones. Defend the digital frontier.
      </p>

      <!-- Buttons -->
      <div class="flex flex-col gap-4 w-full max-w-xs">
        <a
          href="gameplay.html?level=1"
          class="py-4 px-8 bg-gradient-to-r from-primary to-primary-container rounded-xl font-headline font-bold text-on-primary-container text-xl shadow-[0_0_25px_rgba(0,212,255,0.4)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3 no-underline"
        >
          <span class="material-symbols-outlined text-2xl">play_arrow</span>
          PLAY
        </a>
        <a
          href="highscores.html"
          class="py-3.5 px-8 border border-outline-variant/30 hover:border-primary/50 rounded-xl font-headline font-bold text-primary text-lg transition-all hover:bg-primary/5 flex items-center justify-center gap-3 no-underline"
        >
          <span class="material-symbols-outlined">leaderboard</span>
          HIGH SCORES
        </a>
        <a
          href="settings.html"
          class="py-3.5 px-8 border border-outline-variant/30 hover:border-primary/50 rounded-xl font-headline font-bold text-primary text-lg transition-all hover:bg-primary/5 flex items-center justify-center gap-3 no-underline"
        >
          <span class="material-symbols-outlined">settings</span>
          SETTINGS
        </a>
      </div>

      <!-- Footer -->
      <p
        class="mt-16 text-[10px] font-headline tracking-[0.3em] text-outline/40 uppercase"
      >
        v2.4.5-stable // Neural Interface: SECURE
      </p>
    </div>

    
  </body>
</html>
