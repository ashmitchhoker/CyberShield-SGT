<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CYBER SHIELD - SYSTEM FAILURE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/global.css"/>
    <script src="js/components.js"></script>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden min-h-[100dvh] selection:bg-error selection:text-on-error">
    <script src="game-data.js"></script>


    <!-- Main Failure Canvas -->
    <main class="relative min-h-[100dvh] flex flex-col items-center justify-center pt-24 pb-32 md:pb-12 px-6 text-center">
        <div class="absolute inset-0 z-0 red-vignette"></div>

        <div class="relative z-10 max-w-4xl w-full flex flex-col items-center">
            <!-- Broken Heart Icon (Smaller) -->
            <div class="relative mb-4 group scale-75 md:scale-90">
                <div class="absolute inset-0 bg-error blur-[40px] opacity-10 group-hover:opacity-30 transition-opacity"></div>
                <div class="relative flex items-center justify-center">
                    <span class="material-symbols-outlined text-[80px] text-error drop-shadow-[0_0_15px_rgba(255,180,171,0.5)]" style="font-variation-settings: 'FILL' 1;">heart_broken</span>
                </div>
            </div>

            <!-- Main Heading -->
            <h2 class="font-headline text-5xl md:text-7xl font-black tracking-tighter text-error mb-10 drop-shadow-[0_0_15px_rgba(147,0,10,0.8)]">
                SHIELD BROKEN
            </h2>

            <!-- Action Buttons (Moved Up) -->
            <div class="flex flex-col md:flex-row gap-4 w-full max-w-md mb-12">
                <button id="retry-btn" class="flex-1 py-4 px-8 bg-gradient-to-r from-primary to-primary-container rounded-lg font-headline font-bold text-on-primary-container text-lg shadow-[0_0_20px_rgba(0,212,255,0.4)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">replay</span>
                    TRY AGAIN
                </button>
                <a href="index.html" class="flex-1 py-4 px-8 border border-outline-variant/30 hover:border-primary/50 rounded-lg font-headline font-bold text-primary text-lg transition-all hover:bg-primary/5 flex items-center justify-center gap-2 no-underline text-center">
                    <span class="material-symbols-outlined">home</span>
                    MENU
                </a>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full mb-12">
                <div class="bg-surface-container-high/60 backdrop-blur-md p-6 rounded-xl border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-xs uppercase tracking-widest text-[#00d4ff] mb-2 font-bold">TOTAL SCORE</span>
                    <span id="stat-score" class="text-4xl font-headline font-black text-[#00d4ff] drop-shadow-[0_0_10px_rgba(0,212,255,0.4)]">0</span>
                </div>
                <div class="bg-surface-container-high/60 backdrop-blur-md p-6 rounded-xl border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-xs uppercase tracking-widest text-outline mb-2">TIME DEFENDED</span>
                    <span id="stat-time" class="text-4xl font-headline font-bold text-secondary-container">00:00</span>
                </div>
                <div class="bg-surface-container-high/60 backdrop-blur-md p-6 rounded-xl border border-white/5 flex flex-col items-center justify-center border-t-2 border-t-error/50">
                    <span class="text-xs uppercase tracking-widest text-outline mb-2">PURIFICATIONS</span>
                    <span id="stat-zapped" class="text-4xl font-headline font-bold text-error">0</span>
                </div>
                <div class="bg-surface-container-high/60 backdrop-blur-md p-6 rounded-xl border border-white/5 flex flex-col items-center justify-center">
                    <span class="text-xs uppercase tracking-widest text-outline mb-2">ACCURACY</span>
                    <span id="stat-accuracy" class="text-4xl font-headline font-bold text-primary-container">0%</span>
                </div>
            </div>

            <!-- Cyber Tip -->
            <div class="w-full max-w-2xl bg-surface-container-lowest/80 border-l-4 border-primary-container p-6 mb-12 text-left flex gap-4 items-start">
                <span class="material-symbols-outlined text-primary-container">lightbulb</span>
                <div>
                    <h4 id="tip-title" class="font-headline font-bold text-primary-container uppercase tracking-tight mb-1">Cyber Tip</h4>
                    <p id="tip-text" class="text-on-surface/80 text-sm leading-relaxed">
                    </p>
                </div>
            </div>


            <!-- Report Link -->
            <div class="mt-12 flex flex-col items-center gap-2">
                <a href="https://cybercrime.gov.in" target="_blank" 
                   class="text-sm font-headline font-bold text-primary hover:text-white transition-all flex items-center gap-2 no-underline tracking-wider uppercase py-3 px-6 rounded-xl border border-primary/30 hover:border-primary/60 bg-primary/10 hover:bg-primary/20 shadow-[0_0_15px_rgba(0,212,255,0.2)]">
                    <span class="material-symbols-outlined text-lg">security</span>
                    Report Cybercrime Portal
                </a>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <cyber-nav></cyber-nav>

    <script>
    (() => {
        const state = GameData.getGameState();
        const level = state ? state.level : 1;

        if (state) {
            document.getElementById('stat-score').textContent = (state.score || 0).toLocaleString();
            document.getElementById('stat-zapped').textContent = state.wordsZapped || 0;
            document.getElementById('stat-accuracy').textContent = (state.accuracy || 0) + '%';

            const tp = state.timePlayed || 0;
            const mins = Math.floor(tp / 60);
            const secs = tp % 60;
            document.getElementById('stat-time').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        const tip = GameData.getRandomTip();
        document.getElementById('tip-title').textContent = `Cyber Tip: ${tip.title}`;
        document.getElementById('tip-text').innerHTML = tip.text;

        document.getElementById('retry-btn').addEventListener('click', () => {
            GameData.clearGameState();
            window.location.href = `gameplay.html?level=${level}`;
        });
    })();
    </script>
</body>
</html>
